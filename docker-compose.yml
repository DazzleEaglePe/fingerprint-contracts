services:
  postgres:
    image: postgres:16-alpine
    container_name: decdata-postgres
    environment:
      POSTGRES_USER: decdata
      POSTGRES_PASSWORD: decdata_dev_pwd
      POSTGRES_DB: decdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decdata"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
